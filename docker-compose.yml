version: '3.8'

services:
  api:
    build: .
    container_name: heart_disease_api
    ports:
      - "8000:8000"
    env_file:
      - .env
    environment:
      - APP_NAME=Heart Disease Prediction API
      - HOST=0.0.0.0
      - PORT=8000
    restart: unless-stopped
    volumes:
      - ./logs:/usr/src/app/logs
